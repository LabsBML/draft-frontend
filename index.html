<!doctype html>
<html lang="en">

  <meta

    content="Draft helps high school students organize projects, activities, resumes, and college applications in one beautiful workspace."

  <meta name="author" content="Draft" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Canonical -->
  <link rel="canonical" href="https://getdrafts.vercel.app/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Draft" />
  <meta
    property="og:description"
    content="Everything you've done deserves to count. Organize your projects, activities and application documents in one place."
  />
  <meta property="og:url" content="https://getdrafts.vercel.app/" />
  <meta property="og:site_name" content="Draft" />
  <meta property="og:image" content="https://getdrafts.vercel.app/og-image.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Draft" />
  <meta
    name="twitter:description"
    content="Build a stronger college application with projects, activities, resumes and documents—all in one place."
  />
  <meta
    name="twitter:image"
    content="https://getdrafts.vercel.app/og-image.png"
  />

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />
  <meta name="apple-mobile-web-app-title" content="Draft" />

  <!-- Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

  <script type="application/ld+json">

    "@type":"SoftwareApplication",
    "name":"Draft",
    "applicationCategory":"EducationalApplication",
    "operatingSystem":"Web",
    "url":"https://getdrafts.vercel.app",
    "description":"Draft helps high school students organize projects, activities, resumes and college application materials in one place.",

      "@type":"Offer",
      "price":"0",
